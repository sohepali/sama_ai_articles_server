services:
  - type: web
    name: sama-ai-articles-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: APP_SYNC_TOKEN
        sync: false
      - key: NEWS_MIN_FULL_CHARS
        value: "600"
      - key: NEWS_MAX_ARTICLES_PER_SOURCE
        value: "25"
      - key: NEWS_MAX_DOCUMENTS_PER_ARTICLE
        value: "3"
      - key: NEWS_MAX_DOCUMENT_BYTES
        value: "20971520"
      - key: NEWS_APPROVE_PARTIAL
        value: "false"

